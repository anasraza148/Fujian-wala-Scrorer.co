<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CricFlow Professional Overlay v14</title>
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            font-family: 'Arial Narrow', sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; color: white;
        }

        .score-bar {
            display: flex; align-items: center;
            /* PATTI KI POSITION AB YEHAN SE CONTROL HOGI */
            position: fixed;
            bottom: 10%; /* Patti ko 10% upar utha diya hai, pehle ye 25px tha */
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
            z-index: 100; /* Patti sab se upar rahe */
        }

        .segment {
            display: flex; align-items: center; padding: 0 10px;
            border: 1px solid rgba(255,255,255,0.2); margin-right: 2px; height: 36px;
        }

        .red-box { background: linear-gradient(to bottom, #9b0000, #ff0000); min-width: 65px; justify-content: center; }
        .team-l { border-radius: 10px 0 0 10px; font-weight: 900; font-size: 11px; text-transform: uppercase; }

        .bat-box { background: linear-gradient(to bottom, #9b0000, #ff0000); min-width: 105px; justify-content: space-between; }
        .p-name { font-size: 10px; font-weight: bold; text-transform: uppercase; white-space: nowrap; }
        .p-score { font-size: 17px; font-weight: 900; }
        .p-balls { font-size: 10px; color: #ffcccc; margin-left: 2px; }

        .center-score {
            background: linear-gradient(to right, #6a11cb, #ff0077);
            min-width: 155px; height: 50px;
            flex-direction: column; justify-content: center; align-items: center;
            border-top: 3.5px solid #fff; border-radius: 8px;
            margin: 0 3px; box-shadow: 0 0 12px rgba(255, 0, 119, 0.4); z-index: 10;
        }
        .main-runs { font-size: 24px; font-weight: 900; line-height: 1; }
        .sub-text { font-size: 9px; font-weight: bold; margin-top: 1px; }

        .blue-box {
            background: linear-gradient(to right, #004488, #001133);
            min-width: 190px; height: 42px;
            justify-content: space-between; padding: 0 12px; border-radius: 4px;
        }
        .ball-row { display: flex; gap: 3px; margin-top: 2px; }
        .ball { 
            width: 15px; height: 15px; border-radius: 50%; background: #fff; color: #000; 
            font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; 
        }

        .team-r { background: #0080ff; border-radius: 0 10px 10px 0; font-weight: 900; font-size: 11px; min-width: 65px; justify-content: center; text-transform: uppercase; }

        #ticker-box {
            width: 80%; background: rgba(0, 0, 0, 0.8);
            border-bottom: 3px solid #00acc1; padding: 5px 20px;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px; display: none;
            justify-content: center; border-radius: 5px 5px 0 0;
             position: fixed;
    bottom: calc(10% + 50px);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="ticker-box">
        <span id="ticker-text"></span>
    </div>

    <div class="score-bar">
        <div class="segment red-box team-l" id="t1">---</div>

        <div class="segment red-box bat-box">
            <div style="display:flex; flex-direction:column;">
                <span class="p-name" id="b1n">---</span>
                <div><span class="p-score" id="b1r">0</span><span class="p-balls">(<span id="b1b">0</span>)</span></div>
            </div>
            <span style="font-size:12px; margin-left:5px;">▶</span>
        </div>

        <div class="segment red-box bat-box" style="min-width:90px;">
            <div style="display:flex; flex-direction:column;">
                <span class="p-name" id="b2n" style="opacity:0.8;">---</span>
                <div>
                    <span class="p-score" id="b2r" style="opacity:0.8;">0</span>
                    <span class="p-balls" style="opacity:0.8;">(<span id="b2b">0</span>)</span>
                </div>
            </div>
        </div>

        <div class="segment center-score">
            <div class="main-runs"><span id="totalRuns">0</span>-<span id="wickets">0</span></div>
            <div class="sub-text"><span id="bowlOvs">0.0</span> (<span id="ballsInOver">0</span>)</div>
            <div style="font-size:6.5px; font-weight:bold;" id="matchLocDisplay">LIVE</div>
        </div>

        <div class="segment blue-box">
            <div style="display:flex; flex-direction:column; justify-content: center;">
                <span class="p-name" id="bowlName" style="color:#00d9ff; font-size: 10px;">---</span>
                <div class="ball-row" id="recentBalls"></div>
            </div>
            <div style="font-size:16px; font-weight:900;"><span id="bowlWkts">0</span>-<span id="bowlRuns">0</span></div>
        </div>

        <div class="segment team-r" id="t2">---</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAANBBdEWc1jPQurxVLsMjzhvfYQScyK8s",
            authDomain: "cricketoverlay-78b11.firebaseapp.com",
            projectId: "cricketoverlay-78b11",
            storageBucket: "cricketoverlay-78b11.firebasestorage.app",
            messagingSenderId: "967246815015",
            appId: "1:967246815015:web:496750f435ffe158da1302",
            databaseURL: "https://cricketoverlay-78b11-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'liveGame');

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('t1').innerText = data.t1 || "---";
                document.getElementById('t2').innerText = data.t2 || "---";
                document.getElementById('b1n').innerText = data.b1n || "---";
                document.getElementById('b1r').innerText = data.b1r || "0";
                document.getElementById('b1b').innerText = data.b1b || "0";
                document.getElementById('b2n').innerText = data.b2n || "---";
                document.getElementById('b2r').innerText = data.b2r || "0";
                document.getElementById('b2b').innerText = data.b2b || "0";
                document.getElementById('totalRuns').innerText = data.totalRuns || "0";
                document.getElementById('wickets').innerText = data.wickets || "0";
                document.getElementById('bowlOvs').innerText = data.bowlOvs || "0.0";
                document.getElementById('ballsInOver').innerText = data.ballsInOver || "0";
                document.getElementById('bowlName').innerText = data.bowlName || "---";
                document.getElementById('bowlRuns').innerText = data.bowlRuns || "0";
                document.getElementById('bowlWkts').innerText = data.bowlWkts || "0";
                document.getElementById('matchLocDisplay').innerText = "LIVE FROM " + (data.location || "OKARA");

                const tickerBox = document.getElementById('ticker-box');
                const tickerText = document.getElementById('ticker-text');
                if(data.showTicker) {
                    tickerBox.style.display = 'flex';
                    tickerText.innerText = data.tickerMsg || "";
                } else {
                    tickerBox.style.display = 'none';
                }

                const ballContainer = document.getElementById('recentBalls');
                ballContainer.innerHTML = '';
                if(data.recentBalls) {
                    const ballsArray = Array.isArray(data.recentBalls) ? data.recentBalls : Object.values(data.recentBalls);
                    ballsArray.slice(-6).forEach(b => {
                        const d = document.createElement('div');
                        d.className = 'ball';
                        if(b == '6') d.style.background = '#ffd700';
                        if(b == 'W' || b == 'w') { d.style.background = '#f00'; d.style.color = '#fff'; }
                        d.innerText = b;
                        ballContainer.appendChild(d);
                    });
                }
            }
        });
    </script>
</body>
</html>
