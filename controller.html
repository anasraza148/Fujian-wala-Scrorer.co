<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Cricket Controller</title>
    
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAANBBdEWc1jPQurxVLsMjzhvfYQScyK8s",
        authDomain: "cricketoverlay-78b11.firebaseapp.com",
        projectId: "cricketoverlay-78b11",
        storageBucket: "cricketoverlay-78b11.firebasestorage.app",
        messagingSenderId: "967246815015",
        appId: "1:967246815015:web:496750f435ffe158da1302",
        databaseURL: "https://cricketoverlay-78b11-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'liveGame');

    window.gameRef = gameRef;
    window.firebaseSet = set; 

    onValue(gameRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // Live data update for controller labels
            document.getElementById('live-total-score').innerText = data.totalRuns + "/" + data.wickets;
            document.getElementById('live-overs').innerText = "Ovs: " + data.bowlOvs;
        }
    });
    console.log("Firebase Ready!");
    </script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e1e1e; padding: 20px; margin-bottom: 15px; border-radius: 12px; width: 100%; max-width: 650px; border-top: 4px solid #00acc1; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .live-status { background: #00acc1; color: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 650px; gap: 10px; }
        .live-status div { text-align: center; flex: 1; }
        .live-status h3 { margin: 0; font-size: 24px; font-weight: 900; }
        .live-status span { font-size: 11px; text-transform: uppercase; opacity: 0.9; display: block; margin-bottom: 4px; }
        .striker-highlight { border: 2px solid white; border-radius: 6px; padding: 5px; background: rgba(255,255,255,0.1); }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        button { padding: 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 6px; font-size: 14px; transition: 0.2s; }
        .run-btn { background: #00acc1; color: white; }
        .extra-btn { background: #546e7a; color: white; }
        .wicket-btn { background: #c2185b; color: white; }
        .undo-btn { background: #f44336; color: white; grid-column: span 2; }
        .update-btn { background: #ff9800; color: white; width: 100%; margin-top: 10px; }
        input { padding: 10px; margin: 5px; border-radius: 4px; border: 1px solid #333; background: #2c2c2c; color: white; width: 40%; }
        .full-input { width: 95% !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #252525; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; font-size: 13px; }
        th { background: #333; color: #00acc1; }
        label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-top: 8px; }
    </style>
</head>
<body>
    <h2>CRICKET SCORING PRO</h2>

    <div class="live-status">
        <div><span>Match Score</span><h3 id="live-total-score">0/0</h3><small id="live-overs">Ovs: 0.0</small></div>
        <div class="striker-highlight"><span>Striker (▶)</span><h3 id="live-bat1" style="font-size: 18px;">PLAYER 1: 0(0)</h3></div>
        <div><span>Non-Striker</span><h3 id="live-bat2" style="font-size: 18px;">PLAYER 2: 0(0)</h3></div>
    </div>
    
    <div class="card">
        <label>Match Setup & Location</label>
        <div style="display:flex; justify-content:space-between;"><input type="text" id="t1" value="TEAM A"><input type="text" id="t2" value="TEAM B"></div>
        <input type="text" id="matchLoc" class="full-input" value="LOCATION">
        <button class="update-btn" onclick="syncNames()">UPDATE TEAMS & LOCATION</button>
    </div>

    <div class="card">
        <label>Action Panel (Bowler: <span id="current-bowl-name" style="color:#00acc1;">---</span>)</label>
        <div style="display:flex; justify-content: space-around; margin-bottom:10px;">
            <input type="text" id="b1" placeholder="Striker">
            <input type="text" id="b2" placeholder="Non-Striker">
        </div>
        
        <label>Custom Ticker</label>
        <input type="text" id="customText" class="full-input" placeholder="Message...">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button class="update-btn" style="background: #4caf50;" onclick="sendText(true)">SHOW TEXT</button>
            <button class="update-btn" style="background: #f44336;" onclick="sendText(false)">HIDE TEXT</button>
        </div>

        <div class="btn-group">
            <button class="run-btn" onclick="processBall(0, 'reg')">0</button>
            <button class="run-btn" onclick="processBall(1, 'reg')">1</button>
            <button class="run-btn" onclick="processBall(2, 'reg')">2</button>
            <button class="run-btn" onclick="processBall(3, 'reg')">3</button>
            <button class="run-btn" onclick="processBall(4, 'reg')">4</button>
            <button class="run-btn" onclick="processBall(6, 'reg')">6</button>
            <button class="wicket-btn" onclick="processBall('W', 'reg')">WICKET</button>
            <button class="run-btn" onclick="rotateStrike()">STRIKE</button>
            <button class="extra-btn" onclick="askExtra('wd')">WIDE</button>
            <button class="extra-btn" onclick="askExtra('nb')">NO BALL</button>
            <button class="extra-btn" onclick="askExtra('lb')">LB</button>
            <button class="extra-btn" onclick="askExtra('by')">BYE</button>
            <button class="undo-btn" onclick="undoLast()">UNDO</button>
            <button class="extra-btn" style="grid-column: span 2; background:#444;" onclick="handleOverEnd()">NEW OVER</button>
        </div>
    </div>

    <div class="card">
        <label>Bowlers History</label>
        <table><thead><tr><th>Bowler</th><th>Overs</th><th>Runs</th><th>Wkts</th></tr></thead><tbody id="history-body"></tbody></table>
    </div>

    <div class="card" style="border-top: 4px solid #ff0077; background: #1a1a1a;">
        <h3 style="color: #00d9ff; font-size: 16px; margin-bottom: 15px; text-align: center;">LIVE BROADCAST PANEL</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button onclick="activateOverlay(1)" style="flex: 1; background: #2196F3; color: white;">PLAY V1</button>
            <button onclick="activateOverlay(2)" style="flex: 1; background: #E91E63; color: white;">PLAY V2</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button onclick="hideOverlay()" style="flex: 1; background: #444; color: white;">HIDE OVERLAY</button>
            <button onclick="fullResetMatch()" style="flex: 1; background: #d32f2f; color: white;">RESET MATCH</button>
        </div>
    </div>

    <script>
        let game = {
            t1: "TEAM A", t2: "TEAM B", totalRuns: 0, wickets: 0, overs: 0, ballsInOver: 0,
            b1n: "P1", b1r: 0, b1b: 0, b2n: "P2", b2r: 0, b2b: 0,
            location: "OKARA", recentBalls: [],
            bowlName: "ANAS", bowlRuns: 0, bowlWkts: 0, bowlBalls: 0, bowlOvs: "0.0",
            bowlersDB: {}, tickerMsg: "", showTicker: false,
            activeOverlay: 1, showOverlay: false
        };
        
        let history = [];

        window.save = function() { 
            if (window.gameRef && window.firebaseSet) { window.firebaseSet(window.gameRef, game); }
        };

        window.activateOverlay = function(v) {
            game.activeOverlay = v; game.showOverlay = true; save();
            alert("Overlay V" + v + " Active!");
        };

        window.hideOverlay = function() { game.showOverlay = false; save(); };

        window.fullResetMatch = function() {
            if(confirm("Reset Match?")) {
                game.totalRuns = 0; game.wickets = 0; game.bowlBalls = 0; game.bowlOvs = "0.0";
                game.recentBalls = []; game.showOverlay = false; save();
                location.reload();
            }
        };

        window.syncNames = function() {
            game.t1 = document.getElementById('t1').value.toUpperCase();
            game.t2 = document.getElementById('t2').value.toUpperCase();
            game.location = document.getElementById('matchLoc').value.toUpperCase();
            game.b1n = document.getElementById('b1').value.toUpperCase();
            game.b2n = document.getElementById('b2').value.toUpperCase();
            save();
        };

        window.processBall = function(val, type) {
            saveHistory();
            if (val === 'W') { game.wickets++; game.bowlWkts++; game.bowlBalls++; }
            else { game.totalRuns += val; game.b1r += val; game.bowlRuns += val; game.bowlBalls++; game.b1b++; if (val % 2 !== 0) strikeSwitch(); }
            updateBowlStats(); save(); updateLiveDisplay();
        };

        window.handleOverEnd = function() {
            let next = prompt("Next Bowler?");
            if(next) { game.bowlName = next.toUpperCase(); game.bowlBalls = 0; game.bowlRuns = 0; game.bowlWkts = 0; strikeSwitch(); save(); updateLiveDisplay(); }
        };

        window.sendText = function(show) { game.tickerMsg = document.getElementById('customText').value.toUpperCase(); game.showTicker = show; save(); };
        function strikeSwitch() { let temp = {n: game.b1n, r: game.b1r, b: game.b1b}; game.b1n = game.b2n; game.b1r = game.b2r; game.b1b = game.b2b; game.b2n = temp.n; game.b2r = temp.r; game.b2b = temp.b; }
        function updateBowlStats() { game.bowlOvs = Math.floor(game.bowlBalls / 6) + "." + (game.bowlBalls % 6); }
        function saveHistory() { history.push(JSON.stringify(game)); }
        window.rotateStrike = function() { strikeSwitch(); save(); updateLiveDisplay(); };
        window.undoLast = function() { if(history.length > 0) { game = JSON.parse(history.pop()); save(); updateLiveDisplay(); } };
        window.askExtra = function(type) { let val = prompt("Runs?"); if(val) processBall(parseInt(val), type); };
        function updateLiveDisplay() { document.getElementById('live-total-score').innerText = game.totalRuns + "/" + game.wickets; document.getElementById('live-overs').innerText = "Ovs: " + game.bowlOvs; }
    </script>
</body>
</html>
