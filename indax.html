<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cricket Live Overlay Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAANBBdEWc1jPQurxVLsMjzhvfYQScyK8s",
            authDomain: "cricketoverlay-78b11.firebaseapp.com",
            projectId: "cricketoverlay-78b11",
            storageBucket: "cricketoverlay-78b11.firebasestorage.app",
            messagingSenderId: "967246815015",
            appId: "1:967246815015:web:496750f435ffe158da1302",
            databaseURL: "https://cricketoverlay-78b11-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gameRef = ref(db, 'liveGame');

        let lastWicket = -1;
        let lastRuns = -1;

        // --- Firebase Listener: Ye live data pakarta hai ---
        onValue(gameRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
        // --- 1. Teams & Main Score (Purana Code) ---
        document.getElementById('t1-name').innerText = data.t1;
        document.getElementById('t2-name').innerText = data.t2;
        document.getElementById('total-score').innerText = data.totalRuns + "/" + data.wickets;
        document.getElementById('overs-count').innerText = data.bowlOvs;

        // --- 2. Batsmen & Bowler (Purana Code) ---
        document.getElementById('bat1-name').innerText = data.b1n.toUpperCase();
        document.getElementById('bat1-runs').innerText = data.b1r;
        document.getElementById('bat1-balls').innerText = data.b1b;
        document.getElementById('bat2-name').innerText = data.b2n.toUpperCase();
        document.getElementById('bat2-runs').innerText = data.b2r;
        document.getElementById('bat2-balls').innerText = data.b2b;
        document.getElementById('bowl-name').innerText = data.bowlName.toUpperCase();
        document.getElementById('b-runs').innerText = data.bowlRuns;
        document.getElementById('b-wkts').innerText = data.bowlWkts;
        document.getElementById('b-overs').innerText = data.bowlOvs;

        // --- 3. NAYA TICKER LOGIC (Yahan Galti Thi) ---
        const tickerWrap = document.getElementById('ticker-wrap');
        const tickerMsgElement = document.getElementById('ticker-text');

        if (data.showTicker === true) {
            tickerWrap.style.display = "flex"; // Box ko show karein
            setTimeout(() => {
                tickerWrap.classList.add('ticker-visible');
                tickerWrap.classList.remove('ticker-hidden');
            }, 10);
            tickerMsgElement.innerText = data.tickerMsg || "LIVE MATCH";
        } else {
            tickerWrap.classList.add('ticker-hidden');
            tickerWrap.classList.remove('ticker-visible');
            // Animation khatam hone ke baad gayab karein
            setTimeout(() => { 
                tickerWrap.style.display = "none"; 
            }, 500);
        }

        // Recent Balls logic
        const ballContainer = document.getElementById('over-balls');
        ballContainer.innerHTML = '';
        if(data.recentBalls) {
            data.recentBalls.forEach(b => {
                const span = document.createElement('span');
                span.innerText = b;
                if(b == '6' || b == 'W') span.className = 'six';
                ballContainer.appendChild(span);
            });
        }
    }
});

const wrapper = document.getElementById('overlay-wrapper');
// Agar showOverlay true ho AUR activeOverlay ka number 1 ho
if (data.showOverlay === true && data.activeOverlay === 1) {
    wrapper.style.opacity = "1";
} else {
    wrapper.style.opacity = "0";
}

        function showAnim(id) {
            const el = document.getElementById(id);
            if(el) {
                el.style.display = "flex";
                setTimeout(() => { el.style.display = "none"; }, 2500);
            }
        }
    </script>
</head>
<body>

    <div class="out-overlay" id="out-anim">
        <div class="out-box"><span class="out-text">OUT</span><div class="out-line"></div></div>
    </div>

    <div class="boundary-overlay" id="four-anim"><div class="boundary-text four">FOUR</div></div>
    <div class="boundary-overlay" id="six-anim"><div class="boundary-text six">SIX</div></div>
<div id="ticker-wrap" class="ticker-hidden">
    <div id="ticker-text">WELCOME TO LIVE CRICKET</div>
</div>

    <div class="overlay-wrapper">
        <div class="main-scoreboard">
            <div class="box batsmen-box">
                <div class="player-row">
                    <span class="indicator">▶</span>
                    <span class="name" id="bat1-name">PLAYER 1</span>
                    <span class="stats"><span id="bat1-runs">0</span> <span class="balls">(<span id="bat1-balls">0</span>)</span></span>
                </div>
                <div class="player-row">
                    <span class="indicator" style="visibility:hidden">▶</span>
                    <span class="name" id="bat2-name">PLAYER 2</span>
                    <span class="stats"><span id="bat2-runs">0</span> <span class="balls">(<span id="bat2-balls">0</span>)</span></span>
                </div>
            </div>

            <div class="box score-box">
                <div class="team-names">
                    <span id="t1-name">TEAM 1</span> <span class="vs">v</span> <span id="t2-name" class="bold">TEAM 2</span>
                </div>
                <div class="main-total-row">
                    <span class="score" id="total-score">0/0</span>
                    <div class="overs-indicator">
                        <span class="label">Ove:</span>
                        <span id="overs-count">0.0</span>
                    </div>
                </div>
                <div class="tournament-line" id="display-extra-info">LIVE MATCH UPDATES</div>
            </div>

            <div class="box bowler-box">
                <div class="bowler-top">
                    <span class="name" id="bowl-name">BOWLER</span>
                    <span class="bowl-stats"><span id="b-runs">0</span>-<span id="b-wkts">0</span> <span class="b-ovs" id="b-overs">0.0</span></span>
                </div>
                <div class="ball-history" id="over-balls"></div>
            </div>
        </div>
    </div>
</body>
</html>
